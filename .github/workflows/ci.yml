name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: bun install
        run: bun install --frozen-lockfile

      - name: typecheck
        run: bun run typecheck

      - name: lint
        run: bun run lint

      - name: test
        run: bun run test
